name: Phase 4 Release Gate

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'alembic/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/release-gate.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'alembic/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/release-gate.yml'

jobs:
  release-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: analytics
          POSTGRES_PASSWORD: analytics
          POSTGRES_DB: analytics
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U analytics -d analytics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg2://analytics:analytics@localhost:5432/analytics
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply DB migrations
        run: |
          set -e
          for i in $(seq 1 5); do
            if alembic upgrade head; then
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "DB migrations failed after retries"
              exit 1
            fi
            sleep $((i * 2))
          done

      - name: Determinism gate
        run: PYTHONPATH=. pytest -q -m "determinism"

      - name: Async orchestration and queue telemetry gate
        run: PYTHONPATH=. pytest -q -m "api and integration" -k "async or queue_health or checkpoint or correlation"

      - name: Performance smoke gate
        run: |
          PYTHONPATH=. python -m app.cli performance-report
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path('data/performance_report.json')
          if not report_path.exists():
            raise SystemExit('Missing performance report artifact')

          report = json.loads(report_path.read_text())
          total_events = int(report.get('total_events', 0))
          if total_events <= 0:
            raise SystemExit('No performance events were emitted')

          event_counts = report.get('event_counts', {})
          if 'api.request' not in event_counts:
            raise SystemExit('Missing api.request metric event in performance report')

          print('Performance smoke gate passed with total_events=', total_events)
          PY

      - name: Upload release gate performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-performance
          path: |
            data/performance_report.json
            data/performance_metrics.jsonl
